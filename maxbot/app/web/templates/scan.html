{% extends "base.html" %}
{% block title %}QR-сканер — {{ event.title }}{% endblock %}
{% block head %}
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  .scan-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #475569;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    padding: 10px 14px;
    margin-bottom: 12px;
    border-radius: 10px;
    background: #f1f5f9;
    transition: all 0.15s ease;
  }
  
  .scan-back:hover {
    background: #e2e8f0;
    color: #2163F6;
    text-decoration: none;
  }
  
  .scan-subtitle {
    color: #5f5e5a;
    margin: 0 0 16px;
  }
  
  .scan-card {
    max-width: 520px;
    margin: 0 auto;
  }
  
  #reader {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
  }
  
  #result {
    margin-top: 16px;
    padding: 16px;
    border-radius: 12px;
    display: none;
    font-size: 14px;
    line-height: 1.5;
  }
  
  #result code {
    background: rgba(0, 0, 0, 0.08);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
  }
  
  @media (max-width: 768px) {
    .scan-back {
      font-size: 15px;
      padding: 12px 16px;
      margin-bottom: 14px;
    }
    
    h2 {
      font-size: 22px;
      margin: 12px 0 6px;
    }
    
    .scan-subtitle {
      font-size: 13px;
    }
    
    .scan-card {
      max-width: 100%;
      padding: 12px;
      border-radius: 12px;
    }
    
    #result {
      font-size: 13px;
      padding: 14px;
    }
  }
</style>
{% endblock %}
{% block content %}
<a href="{{ url_for('admin.event_detail', event_id=event.id) }}" class="scan-back">← К карточке</a>
<h2>QR-сканер</h2>
<p class="scan-subtitle">{{ event.title }}</p>

<div class="card scan-card">
  <div id="reader"></div>
  <div id="result"></div>
</div>

<script>
const eventId = {{ event.id }};
let lastToken = null;
let lastTokenTime = 0;

function showResult(ok, payload) {
  const box = document.getElementById('result');
  box.style.display = 'block';
  if (ok) {
    box.style.background = '#d4f4d4';
    box.style.color = '#1a5928';
    box.innerHTML = `<strong>✓ Допущен</strong><br>${payload.participant || ''} <code>${payload.code || ''}</code>`;
  } else {
    box.style.background = '#fadcd9';
    box.style.color = '#7c1f1f';
    box.innerHTML = `<strong>✗ ${payload.reason}</strong>` +
      (payload.participant ? `<br>${payload.participant} <code>${payload.code || ''}</code>` : '');
  }
}

async function verify(token) {
  const now = Date.now();
  // Защита от повторной отправки одного и того же токена в течение 3 сек
  if (token === lastToken && (now - lastTokenTime) < 3000) return;
  lastToken = token;
  lastTokenTime = now;
  try {
    const resp = await fetch("{{ url_for('admin.scan_verify') }}", {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token, event_id: eventId})
    });
    const data = await resp.json();
    showResult(data.ok, data);
  } catch (e) {
    showResult(false, {reason: 'Ошибка сети'});
  }
}

const scanner = new Html5Qrcode("reader");
scanner.start(
  {facingMode: "environment"},
  {fps: 10, qrbox: {width: 260, height: 260}},
  (decodedText) => verify(decodedText),
  (errorMessage) => {/* игнорируем */}
).catch(err => {
  document.getElementById('reader').innerHTML =
    '<p style="color:#7c1f1f;padding:16px;">Не удалось получить доступ к камере. Разрешите доступ в браузере.</p>';
});
</script>
{% endblock %}
